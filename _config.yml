# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: Fluid Mechanics Class Notes
author: Carlos D. Hoyos 
logo: logo.png

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: force

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex
  packages:
    - amsmath
    - amssymb
    - tikz

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# Information about where the book exists on the web
repository:
  url: https://github.com/carlosdhoyos/fluid_mechanics  # Online location of your book
  branch: main  # Which branch of the repository should be used when creating links (optional)

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  theme:
    name: sphinx_book_theme
    options:
      default_mode: "light"  # Ensures the light theme is the default
      launch_buttons: false  # Disables extra buttons that can crowd the UI
      home_page_in_toc: true  # Ensures the home page is in the table of contents
      use_sidenotes: true  # Other theme options
      show_download_button: true  # Allows download buttons (customizable)


# Disable source file downloads but allow PDF download
downloads:
  pdf: true    # Enable PDF download
  ipynb: false  # Disable notebook downloads
  html: false  # Disable HTML downloads
  rst: false  # Disable reStructuredText downloads
  md: false   # Disable markdown downloads

pdf:
  use_pdf_download_button: true  # Enable PDF download button

launch_buttons:
  thebe: false  # This enables Thebe for interactive code cells
